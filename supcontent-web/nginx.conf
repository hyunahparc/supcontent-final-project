# ============================================================
# Configuration Nginx — SPA React (supcontent-web)
# Toutes les routes inconnues sont renvoyées vers index.html
# pour que React Router gère la navigation côté client
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Racine des fichiers statiques générés par Vite
    root /usr/share/nginx/html;
    index index.html;

    # Taille max du corps des requêtes (upload d'avatar jusqu'à 5 Mo)
    # Sans cette ligne, Nginx renvoie 413 dès 1 Mo (valeur par défaut)
    client_max_body_size 5M;

    # Proxy des appels API vers le backend
    # Le navigateur appelle /api/... → Nginx forwarde vers le backend Docker
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Fallback SPA : toute route non trouvée → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Désactiver les logs pour les assets statiques (optionnel, réduit le bruit)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
