openapi: 3.0.0
info:
    title: SUPCONTENT API
    version: 1.0.0
    description: Cinema social network API

servers:
    - url: http://localhost:3000/api

components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
    schemas:
        MediaType:
            type: string
            enum: [Movie, Series]
            example: Movie
        MediaSummary:
            type: object
            properties:
                external_id:
                    type: integer
                    example: 550
                title:
                    type: string
                    example: Fight Club
                media_type:
                    $ref: '#/components/schemas/MediaType'
                poster_path:
                    type: string
                    nullable: true
                release_date:
                    type: string
                    nullable: true
                vote_average:
                    type: number
                    nullable: true
        MediaDetail:
            type: object
            properties:
                id:
                    type: integer
                    example: 550
                media_type:
                    $ref: '#/components/schemas/MediaType'
                title:
                    type: string
                    example: Fight Club
                overview:
                    type: string
                poster_path:
                    type: string
                    example: /pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg
                backdrop_path:
                    type: string
                    nullable: true
                release_date:
                    type: string
                    example: '1999-10-15'
                runtime:
                    type: integer
                    nullable: true
                vote_average:
                    type: number
                    example: 8.4
                genres:
                    type: array
                    items:
                        type: object
                director:
                    type: string
                    nullable: true
                cast:
                    type: array
                    items:
                        type: object
                similar:
                    type: array
                    items:
                        $ref: '#/components/schemas/MediaSummary'
        User:
            type: object
            properties:
                user_id:
                    type: integer
                email:
                    type: string
                username:
                    type: string

paths:
    /auth/register:
        post:
            tags:
                - Auth
            summary: Register a new user
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - email
                                - username
                                - password
                            properties:
                                email:
                                    type: string
                                    example: test@test.com
                                username:
                                    type: string
                                    example: testuser
                                password:
                                    type: string
                                    example: Test1234!
            responses:
                '201':
                    description: Registration successful
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                    userId:
                                        type: integer
                '400':
                    description: All fields are required
                '409':
                    description: Email already in use

    /auth/login:
        post:
            tags:
                - Auth
            summary: Login with email and password
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - email
                                - password
                            properties:
                                email:
                                    type: string
                                    example: test@test.com
                                password:
                                    type: string
                                    example: Test1234!
            responses:
                '200':
                    description: Login successful
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                                    user:
                                        $ref: '#/components/schemas/User'
                '401':
                    description: Invalid email or password

    /auth/google:
        get:
            tags:
                - Auth
            summary: Login with Google OAuth
            responses:
                '302':
                    description: Redirects to Google login page

    /auth/google/callback:
        get:
            tags:
                - Auth
            summary: Google OAuth callback
            responses:
                '200':
                    description: Login successful, returns JWT token
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                                    user:
                                        $ref: '#/components/schemas/User'

    /search:
        get:
            tags:
                - Search
            summary: Search movies and TV series
            parameters:
                - in: query
                  name: q
                  required: true
                  schema:
                      type: string
                  description: Search query
                  example: fight club
                - in: query
                  name: type
                  schema:
                      type: string
                      enum: [all, Movie, Series]
                      default: all
                - in: query
                  name: limit
                  schema:
                      type: integer
                      default: 10
            responses:
                '200':
                    description: List of matching media
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        external_id:
                                            type: integer
                                        title:
                                            type: string
                                        media_type:
                                            type: string
                                        poster_path:
                                            type: string
                                        release_date:
                                            type: string
                                        vote_average:
                                            type: number

    /collections:
        post:
            tags:
                - Collections
            summary: Add or update a media item in collection
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - external_id
                                - media_type
                                - status
                            properties:
                                external_id:
                                    type: integer
                                    example: 550
                                media_type:
                                    $ref: '#/components/schemas/MediaType'
                                status:
                                    type: string
                                    enum: [To Watch, Watching, Completed, Dropped]
            responses:
                '200':
                    description: Collection entry upserted
                '400':
                    description: Invalid status
                '401':
                    description: Unauthorized

    /collections/{external_id}:
        get:
            tags:
                - Collections
            summary: Get collection status for a media item
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: external_id
                  required: true
                  schema:
                      type: integer
                  example: 550
                - in: query
                  name: media_type
                  required: true
                  schema:
                      $ref: '#/components/schemas/MediaType'
            responses:
                '200':
                    description: Collection status
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        nullable: true
        delete:
            tags:
                - Collections
            summary: Remove a media item from collection
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: external_id
                  required: true
                  schema:
                      type: integer
                  example: 550
                - in: query
                  name: media_type
                  required: true
                  schema:
                      $ref: '#/components/schemas/MediaType'
            responses:
                '200':
                    description: Removed from collection
                '401':
                    description: Unauthorized

    /users/{id}/collection:
        get:
            tags:
                - Collections
            summary: Get a user's collection
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
                - in: query
                  name: status
                  schema:
                      type: string
                      enum: [To Watch, Watching, Completed, Dropped]
            responses:
                '200':
                    description: List of collection items

    /reviews/{external_id}:
        get:
            tags:
                - Reviews
            summary: Get all reviews for a media item
            parameters:
                - in: path
                  name: external_id
                  required: true
                  schema:
                      type: integer
                  example: 550
                - in: query
                  name: media_type
                  required: true
                  schema:
                      $ref: '#/components/schemas/MediaType'
            responses:
                '200':
                    description: List of reviews with likes and comment counts

    /reviews/{external_id}/my:
        get:
            tags:
                - Reviews
            summary: Get my review for a media item
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: external_id
                  required: true
                  schema:
                      type: integer
                - in: query
                  name: media_type
                  required: true
                  schema:
                      $ref: '#/components/schemas/MediaType'
            responses:
                '200':
                    description: My review or null

    /reviews:
        post:
            tags:
                - Reviews
            summary: Create or update own review
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - external_id
                                - media_type
                            properties:
                                external_id:
                                    type: integer
                                    example: 550
                                media_type:
                                    $ref: '#/components/schemas/MediaType'
                                rating:
                                    type: number
                                    example: 4.5
                                comment:
                                    type: string
                                    example: Great movie!
            responses:
                '200':
                    description: Review created or updated
                '401':
                    description: Unauthorized

    /reviews/{review_id}:
        delete:
            tags:
                - Reviews
            summary: Delete own review
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: review_id
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: Review deleted
                '404':
                    description: Review not found or not yours

    /reviews/{review_id}/like:
        post:
            tags:
                - Reviews
            summary: Toggle like on a review
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: review_id
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: Like toggled
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    liked:
                                        type: boolean

    /reviews/{review_id}/comments:
        get:
            tags:
                - Reviews
            summary: Get comments on a review
            parameters:
                - in: path
                  name: review_id
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: List of comments
        post:
            tags:
                - Reviews
            summary: Add a comment to a review
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: review_id
                  required: true
                  schema:
                      type: integer
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - content
                            properties:
                                content:
                                    type: string
                                    example: I agree!
            responses:
                '200':
                    description: Comment added

    /reviews/{review_id}/comments/{comment_id}:
        delete:
            tags:
                - Reviews
            summary: Delete own comment
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: review_id
                  required: true
                  schema:
                      type: integer
                - in: path
                  name: comment_id
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: Comment deleted
                '404':
                    description: Comment not found or not yours

    /lists:
        get:
            tags:
                - Lists
            summary: Get current user's custom lists
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: List of custom lists with media count and preview posters
                '401':
                    description: Unauthorized
        post:
            tags:
                - Lists
            summary: Create a new custom list
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - name
                            properties:
                                name:
                                    type: string
                                    example: My Horror Favorites
                                is_public:
                                    type: boolean
                                    default: false
            responses:
                '201':
                    description: List created
                '400':
                    description: List name is required
                '401':
                    description: Unauthorized

    /lists/{id}:
        get:
            tags:
                - Lists
            summary: Get a list with its media items
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: List detail with media items
                '403':
                    description: This list is private
                '404':
                    description: List not found
        put:
            tags:
                - Lists
            summary: Update list name or visibility
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    example: Updated List Name
                                is_public:
                                    type: boolean
            responses:
                '200':
                    description: List updated
                '404':
                    description: List not found or not yours
        delete:
            tags:
                - Lists
            summary: Delete a list
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: List deleted
                '404':
                    description: List not found or not yours

    /lists/{id}/media:
        post:
            tags:
                - Lists
            summary: Add a media item to a list
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - external_id
                                - media_type
                            properties:
                                external_id:
                                    type: integer
                                    example: 550
                                media_type:
                                    $ref: '#/components/schemas/MediaType'
            responses:
                '201':
                    description: Media item added to list
                '404':
                    description: List not found or not yours

    /lists/{id}/media/{external_id}:
        delete:
            tags:
                - Lists
            summary: Remove a media item from a list
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
                - in: path
                  name: external_id
                  required: true
                  schema:
                      type: integer
                  example: 550
                - in: query
                  name: media_type
                  required: true
                  schema:
                      $ref: '#/components/schemas/MediaType'
            responses:
                '200':
                    description: Media item removed from list
                '404':
                    description: Media item not found in list

    /users/{id}/lists:
        get:
            tags:
                - Lists
            summary: Get a user's public lists
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
            responses:
                '200':
                    description: List of public custom lists

    /media/trending:
        get:
            tags:
                - Media
            summary: Get trending movies and series
            parameters:
                - in: query
                  name: type
                  schema:
                      type: string
                      enum: [all, Movie, Series]
                      default: all
                - in: query
                  name: limit
                  schema:
                      type: integer
                      default: 12
                      minimum: 1
                      maximum: 50
            responses:
                '200':
                    description: Trending media
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/MediaSummary'

    /media/movie/{id}:
        get:
            tags:
                - Media
            summary: Get movie detail by TMDB ID
            description: Returns movie metadata from DB cache. Fetches from TMDB and caches if not found or expired.
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
                  description: TMDB movie ID
                  example: 550
            responses:
                '200':
                    description: Movie detail
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MediaDetail'
                '404':
                    description: Media not found
                '500':
                    description: Server error

    /media/tv/{id}:
        get:
            tags:
                - Media
            summary: Get TV series detail by TMDB ID
            description: Returns TV series metadata from DB cache. Fetches from TMDB and caches if not found or expired.
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
                  description: TMDB TV series ID
                  example: 1399
            responses:
                '200':
                    description: TV series detail
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MediaDetail'
                '404':
                    description: Media not found
                '500':
                    description: Server error

    /feed:
        get:
            tags:
                - Feed
            summary: Get activity feed from followed users
            description: Returns recent review and collection activities from users followed by the authenticated user.
            security:
                - BearerAuth: []
            parameters:
                - in: query
                  name: limit
                  schema:
                      type: integer
                      default: 20
                      maximum: 50
                  description: Maximum number of activities to return
                - in: query
                  name: offset
                  schema:
                      type: integer
                      default: 0
                  description: Number of activities to skip
            responses:
                '200':
                    description: Feed activities
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    limit:
                                        type: integer
                                    offset:
                                        type: integer
                                    total:
                                        type: integer
                                    results:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                activity_id:
                                                    type: integer
                                                activity_type:
                                                    type: string
                                                    enum: [review, collection]
                                                metadata:
                                                    type: object
                                                    example:
                                                        rating: 4.5
                                                        comment: Great movie!
                                                        status: Completed
                                                created_at:
                                                    type: string
                                                    format: date-time
                                                actor_id:
                                                    type: integer
                                                actor_username:
                                                    type: string
                                                actor_avatar:
                                                    type: string
                                                    nullable: true
                                                external_id:
                                                    type: integer
                                                    nullable: true
                                                media_type:
                                                    type: string
                                                    nullable: true
                                                full_data:
                                                    type: object
                                                    nullable: true
                                                review_id:
                                                    type: integer
                                                    nullable: true
                                                rating:
                                                    type: number
                                                    nullable: true
                                                comment:
                                                    type: string
                                                    nullable: true
                '401':
                    description: Unauthorized

    /notifications:
        get:
            tags:
                - Notifications
            summary: Get current user's notifications
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: List of notifications
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        notification_id:
                                            type: integer
                                        type:
                                            type: string
                                            enum: [like, comment, follow]
                                        is_read:
                                            type: boolean
                                        created_at:
                                            type: string
                                            format: date-time
                                        media_id:
                                            type: integer
                                            nullable: true
                                        media_type:
                                            type: string
                                            enum: [Movie, Series]
                                            nullable: true
                                        review_id:
                                            type: integer
                                            nullable: true
                                        source_user_id:
                                            type: integer
                                            nullable: true
                                        source_username:
                                            type: string
                                            nullable: true
                                        source_avatar:
                                            type: string
                                            nullable: true
                                        media_title:
                                            type: string
                                            nullable: true
                '401':
                    description: Unauthorized

    /notifications/unread-count:
        get:
            tags:
                - Notifications
            summary: Get unread notification count
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: Unread notification count
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    count:
                                        type: integer
                '401':
                    description: Unauthorized

    /notifications/read-all:
        patch:
            tags:
                - Notifications
            summary: Mark all notifications as read
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: All notifications marked as read
                '401':
                    description: Unauthorized

    /notifications/{id}/read:
        patch:
            tags:
                - Notifications
            summary: Mark one notification as read
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
                  description: Notification ID
            responses:
                '200':
                    description: Notification marked as read
                '401':
                    description: Unauthorized

    /messages/conversations:
        get:
            tags:
                - Messages
            summary: Get mutual followers with their latest private message
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: Conversation list
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        user_id:
                                            type: integer
                                        username:
                                            type: string
                                        avatar:
                                            type: string
                                            nullable: true
                                        can_chat:
                                            type: boolean
                                        last_message_id:
                                            type: integer
                                            nullable: true
                                        last_message:
                                            type: string
                                            nullable: true
                                        last_sender_id:
                                            type: integer
                                            nullable: true
                                        last_message_at:
                                            type: string
                                            format: date-time
                                            nullable: true
                                        unread_count:
                                            type: integer
                '401':
                    description: Unauthorized

    /messages/unread-count:
        get:
            tags:
                - Messages
            summary: Get unread private message count
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: Unread private message count
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    count:
                                        type: integer
                '401':
                    description: Unauthorized

    /messages/{userId}:
        get:
            tags:
                - Messages
            summary: Get private messages with a mutual follower
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: userId
                  required: true
                  schema:
                      type: integer
                  description: Other user ID
            responses:
                '200':
                    description: Message history
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    can_chat:
                                        type: boolean
                                    messages:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                message_id:
                                                    type: integer
                                                sender_id:
                                                    type: integer
                                                receiver_id:
                                                    type: integer
                                                content:
                                                    type: string
                                                created_at:
                                                    type: string
                                                    format: date-time
                                                read_at:
                                                    type: string
                                                    format: date-time
                                                    nullable: true
                                                sender_username:
                                                    type: string
                                                sender_avatar:
                                                    type: string
                                                    nullable: true
                '401':
                    description: Unauthorized
        post:
            tags:
                - Messages
            summary: Send a private message to a mutual follower
            security:
                - BearerAuth: []
            parameters:
                - in: path
                  name: userId
                  required: true
                  schema:
                      type: integer
                  description: Receiver user ID
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - content
                            properties:
                                content:
                                    type: string
                                    maxLength: 1000
            responses:
                '201':
                    description: Message created
                '400':
                    description: Invalid or empty message
                '401':
                    description: Unauthorized
                '403':
                    description: Users are not mutual followers
